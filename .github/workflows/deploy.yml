name: Deploy to Mini-PC

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: Restart PM2
      run: |
        pm2 restart profile