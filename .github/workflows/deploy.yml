name: Deploy to Mini-PC

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:

        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '20'

        # 3. สั่ง Deploy ในโฟลเดอร์จริง (แก้ path ให้ตรงเป๊ะๆ นะครับ)
        - name: Deploy to Server
          run: |
            cd /home/ikk/my-profile

            git checkout package-lock.json

            git pull origin main

            npm run build

            pm2 restart my-profile || pm2 start npm --name "my-profile" -- start